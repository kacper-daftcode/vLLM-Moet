# Kimi-K2.7-Code TP4 + the AQ-MedAI Eagle3 community drafter (+12% median,
# high run-to-run variance - see docs/kimi-k27-code-plan.md P6).
id: kimi-k2.7-code-nvfp4/pro6000x4-tp4-eagle3
model: Kimi-K2.7-Code-NVFP4
served_name: kimi-k2.7-code
summary: "4x RTX PRO 6000 TP4 - + Eagle3 drafter (k=3, drafter TP4)"

requires:
  gpus: 4
  vram_gb: 96
  extra_models: [Kimi-K2.7-Code-eagle3]

context: 262144
load_timeout_s: 3600

env:
  VLLM_MOE_W2: "1"
  # Delta tier OFF for this recipe: its runtime precision flips make greedy
  # non-deterministic, which couples into acceptance and spreads throughput
  # 38-63 tok/s. Benchmarked without it, by policy.
  VLLM_MOE_W2_DELTA_GB: "0"
  VLLM_MOE_W2_PLANES_CACHE: "{planes_cache}"

serve_args:
  - --trust-remote-code
  - --tensor-parallel-size 4
  - --disable-custom-all-reduce
  - --kv-cache-dtype fp8
  - --block-size 256
  - --max-model-len 262144
  - --gpu-memory-utilization 0.94
  - --max-num-batched-tokens 2048
  - --max-num-seqs 8
  - --no-scheduler-reserve-full-isl
  - --enable-auto-tool-choice
  - --tool-call-parser kimi_k2
  - --reasoning-parser kimi_k2
  - --speculative-config {"model":"{model:Kimi-K2.7-Code-eagle3}","method":"eagle3","num_speculative_tokens":3,"draft_tensor_parallel_size":4}
  - --compilation-config {"cudagraph_mode":"FULL_AND_PIECEWISE","custom_ops":["all"]}

suite_params:
  decode:
    runs: 9                     # spec-decode variance: report the spread honestly
  batch_decode:
    concurrency: [1, 4, 8]
  needle:
    sizes_words: [6000, 24000]

tuning:
  objective: decode.median_tok_s
  constraints: ["coherence.pass"]
  axes:
    - kind: serve_json
      arg: --speculative-config
      key: num_speculative_tokens
      values: [1, 3]            # MLA capture-size issue at other values
      restart: true

notes: |
  Alternatives staged but unbenchmarked as recipes: suffix decoding
  ({"method":"suffix","num_speculative_tokens":32}, arctic-inference) and
  plain ngram - both zero-extra-VRAM; sweep them here if this variant keeps
  underdelivering.
