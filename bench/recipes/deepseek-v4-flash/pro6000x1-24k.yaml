id: deepseek-v4-flash/pro6000x1-24k
model: DeepSeek-V4-Flash
served_name: deepseek-v4-flash
summary: "1x RTX PRO 6000 - quality 128k single-stream (~150 tok/s)"

requires:
  gpus: 1
  vram_gb: 96

context: 131072
load_timeout_s: 2400

# Quality-validated 2026-07-13: GSM8K-200 96.5% vs native 97.0% (McNemar
# p=1), needle @121k PASS, 149 tok/s single-stream. Resident planes eat
# 72.7 GiB, so the last ~5 GiB split between the FP4 need-pool and KV:
# NON-SPLIT 1.5 GiB pool + one 128k stream at util 0.97 (0.95 leaves
# only 1.04 GiB KV and the boot fails; MTP scratch has a ~1.7 GiB fixed
# floor). Two streams need dropping the window to 64k. Gate tau 0.60 =
# code default.
env:
  VLLM_MOE_W2: "1"
  VLLM_MOE_W2_DELTA_GB: "1.5"
  VLLM_MOE_W2_GATE: "1"
  # pool below the FIRE FLOOR (one step's routed union ~10 GiB
  # non-split at TP1): fires cannot cover their own step, so the
  # only sound mode is INCREMENTAL promotion - uncapped measured
  # 94.5% / +110%% tokens vs 96.5%/95.0%% with cap 64. Remove the
  # cap only on configs with pool >= the step routed union.
  VLLM_MOE_W2_GATE_MAX_PROMOTE: "64"

serve_args:
  - --trust-remote-code
  - --kv-cache-dtype fp8
  - --block-size 256
  - --max-model-len 131072
  - --gpu-memory-utilization 0.97
  - --max-num-batched-tokens 4096
  - --max-num-seqs 1
  - --tokenizer-mode deepseek_v4
  - --no-scheduler-reserve-full-isl
  - --speculative-config {"method":"deepseek_mtp","num_speculative_tokens":2}
  - --compilation-config {"cudagraph_mode":"FULL_AND_PIECEWISE","custom_ops":["all"]}

suite_params:
  batch_decode:
    concurrency: [1]
  needle:
    sizes_words: [8000, 90000]
    depth: 0.5

tuning:
  objective: decode.median_tok_s
  constraints: ["arithmetic.score>=2", "needle.all_pass"]
  axes:
    - kind: env
      name: VLLM_MOE_W2_DELTA_GB
      values: ["1.5", "1", "0"]
