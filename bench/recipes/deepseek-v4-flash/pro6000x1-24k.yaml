id: deepseek-v4-flash/pro6000x1-24k
model: DeepSeek-V4-Flash
served_name: deepseek-v4-flash
summary: "1x RTX PRO 6000 - resident FAST mode, above-native NT @32k"

requires:
  gpus: 1
  vram_gb: 96

context: 131072
load_timeout_s: 2400

# FAST mode (default), quality-validated 2026-07-21..24 with the
# WINDOW-MATCHED protocol (greedy GPQA swings with the serving window
# for the model itself; native@32k NT = 69.04):
#   GSM8K ~97 | GPQA NT 73.23 vs native@32k 69.04 (ABOVE native).
# Point: MTP-2 + gate OFF + prefill-FP4 ensure over a NON-SPLIT
# 3.4 GiB pool (covers the L0/L1 prefill unions ~212 experts; split
# is quality-banned - lossy mag-0 merge - and 1.5 GiB starved the
# ensure guarantee: measured 68.7 -> 73.2 through 1.5split/3.0split/
# 3.4nonsplit). Gate stays OFF because the MTP-2 fire floor (~15.4
# GiB non-split) cannot fit next to 72.7 GiB resident planes - the
# sub-floor incremental gate is condemned by paired NT (68.2-70.2,
# GSM8K-invisible).
# QUALITY mode (think-grade, no spec): drop MTP, DELTA_GB=6,
# GATE=1 TAU=0.60 MAX_PROMOTE=0 SPEC_MASK=1 -> NT 75.25 vs
# native@24k 74.62, THINK-HIGH @44k 85.86 vs 86.87. Slower
# (no spec); pick it when think-mode quality is the workload.
env:
  VLLM_MOE_W2: "1"
  VLLM_MOE_W2_DELTA_GB: "3.4"
  VLLM_MOE_W2_GATE: "0"
  VLLM_MOE_W2_FORCE_POOL: "1"
  VLLM_MOE_W2_FORCE_RESIDENT: "1"
  # prefill-FP4 ensure: with the 3.4 GiB non-split pool the guarantee
  # holds for every prefill chunk's per-layer union (measured L0:212
  # L1:205 at 1.6-2k prompts; 1.5 GiB silently zeroed chunk
  # contributions - the mechanism behind the old -4.5pp GPQA note).
  VLLM_MOE_W2_PREFILL_FP4: "ensure"
  VLLM_MOE_W2_PREFILL_T: "16"

serve_args:
  - --trust-remote-code
  - --kv-cache-dtype fp8
  - --block-size 256
  - --max-model-len 32768
  - --gpu-memory-utilization 0.97
  - --max-num-batched-tokens 256
  - --max-num-seqs 1
  - --tokenizer-mode deepseek_v4
  - --no-scheduler-reserve-full-isl
  - --speculative-config {"method":"deepseek_mtp","num_speculative_tokens":2}
  - --compilation-config {"cudagraph_mode":"FULL_AND_PIECEWISE","custom_ops":["all"]}

suite_params:
  batch_decode:
    concurrency: [1]
  needle:
    sizes_words: [8000, 24000]
    depth: 0.5

tuning:
  objective: decode.median_tok_s
  constraints: ["arithmetic.score>=2", "needle.all_pass"]
  axes:
    - kind: env
      name: VLLM_MOE_W2_DELTA_GB
      values: ["3.4", "6"]
# WINDOW 32768 (was 131072): the measured FAST-mode geometry. The 128k
# window only fits next to a 1.5 GiB pool, and 1.5 GiB starves the
# prefill-ensure guarantee (silent chunk zeroing -> the old -4.5pp GPQA).
# A 128k variant needs the cache route (pro6000x1-cache).
# batched-tokens 256: each prefill chunk's per-layer working set must
# fit the pool rotation - measured at 256 (2026-07-17 campaign).
