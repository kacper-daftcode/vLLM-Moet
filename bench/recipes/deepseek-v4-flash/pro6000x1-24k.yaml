# DS4-Flash, single 96 GB card, throughput config (the README headline row).
id: deepseek-v4-flash/pro6000x1-24k
model: DeepSeek-V4-Flash
served_name: deepseek-v4-flash
summary: "1x RTX PRO 6000 - throughput (24K ctx, FP4 delta auto, MTP k=2)"

requires:
  gpus: 1
  vram_gb: 96

context: 24576
load_timeout_s: 2400

env:
  VLLM_MOE_W2: "1"
  VLLM_MOE_W2_DELTA_GB: "auto"

serve_args:
  - --trust-remote-code
  - --kv-cache-dtype fp8
  - --block-size 256
  - --max-model-len 24576
  - --gpu-memory-utilization 0.95
  - --max-num-batched-tokens 1024
  - --max-num-seqs 4
  - --tokenizer-mode deepseek_v4
  - --no-scheduler-reserve-full-isl
  - --speculative-config {"method":"deepseek_mtp","num_speculative_tokens":2}
  - --compilation-config {"cudagraph_mode":"FULL_AND_PIECEWISE","custom_ops":["all"]}

suite_params:
  batch_decode:
    concurrency: [1, 4]          # mns 4 in this config; the full 1-32 curve is the -batch variant
  needle:
    sizes_words: [8000, 20000]
    depth: 0.5

tuning:
  objective: decode.median_tok_s
  constraints: ["arithmetic.score>=2", "needle.all_pass"]
  axes:
    - kind: env
      name: VLLM_MOE_W2_DELTA_GB
      values: ["auto", "1", "0"]

notes: |
  Historical batch-scaling numbers (933 tok/s @32) were taken with
  --max-num-seqs 32 --max-num-batched-tokens 2048; fold that into a sweep or a
  dedicated batch recipe on the next live run.
