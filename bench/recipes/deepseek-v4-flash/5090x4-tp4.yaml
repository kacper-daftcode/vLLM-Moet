id: deepseek-v4-flash/5090x4-tp4
model: DeepSeek-V4-Flash
served_name: deepseek-v4-flash
summary: "4x RTX 5090 TP4 - cheapest contract-clean quality config (32k)"

requires:
  gpus: 4
  vram_gb: 32

context: 32768
load_timeout_s: 2400

# 2026-07-13: gate ON (tau 0.60 = code default), NON-SPLIT pool 3 GiB/rank
# (1444 slots >= the fire floor 1346 at 1 seq x FP-growth 1.7; 2 seqs
# would need 8.4 GiB - beyond this card. Per-rank TP4 slots are 4x
# smaller, making this the cheapest class that clears the fire-floor
# hardstop -> uncapped fires + high tau are legal). Split is
# quality-banned (internal/SPLIT_FP4_ZERO_LOSS_NEXT_SESSION.md). Not yet
# quality-benched on this topology - GSM8K/needle pending free 5090s.
env:
  VLLM_MOE_W2: "1"
  VLLM_MOE_W2_DELTA_GB: "4.5"
  VLLM_MOE_W2_GATE: "1"

serve_args:
  - --trust-remote-code
  - --tensor-parallel-size 4
  - --disable-custom-all-reduce
  - --kv-cache-dtype fp8
  - --block-size 256
  - --max-model-len 32768
  - --gpu-memory-utilization 0.95
  - --max-num-batched-tokens 1024
  - --max-num-seqs 1
  - --tokenizer-mode deepseek_v4
  - --no-scheduler-reserve-full-isl
  - --speculative-config {"method":"deepseek_mtp","num_speculative_tokens":2}
  - --compilation-config {"cudagraph_mode":"FULL_AND_PIECEWISE","custom_ops":["all"]}

suite_params:
  batch_decode:
    concurrency: [1, 4]
  needle:
    sizes_words: [8000, 12000]
