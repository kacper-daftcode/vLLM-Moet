id: deepseek-v4-flash/5090x4-tp4
model: DeepSeek-V4-Flash
served_name: deepseek-v4-flash
summary: "4x RTX 5090 TP4 - native-parity quality at 184 tok/s (32k)"

requires:
  gpus: 4
  vram_gb: 32

context: 32768
load_timeout_s: 2400

# Quality-validated 2026-07-21..23 (window-matched protocol; native@32k
# NT = 69.04, native think-high@131k = 86.87):
#   GSM8K 97.0-97.5 | GPQA NT 68.69 vs 69.04 (matched, ns) |
#   THINK-HIGH @65k budget: 85.86 vs 86.87 (2 items, 1 truncation).
# Operating point: gate tau 0.60 + S4 + UNCAPPED fires (pool 4.5/rank
# clears the MTP-2 fire floor - no warning at boot), prefill-FP4
# ensure. ~165 tok/s agg (GSM8K conc2); gate-off ceiling 209 tok/s
# holds NT (75.25) but drops think to 83.84 - the gate earns its keep
# exactly on think-class decode. MTP-2 on RESIDENT routes is healthy
# (unlike streamed-base cells - see the spec-drift note in the
# basecache recipes).
env:
  VLLM_MOE_W2: "1"
  VLLM_MOE_W2_DELTA_GB: "4.5"
  VLLM_MOE_W2_GATE: "1"
  VLLM_MOE_W2_GATE_TAU: "0.60"
  VLLM_MOE_W2_GATE_MAX_PROMOTE: "0"
  VLLM_MOE_W2_GATE_SPEC_MASK: "1"
  VLLM_MOE_W2_PREFILL_FP4: "ensure"
  VLLM_MOE_W2_PREFILL_T: "16"

serve_args:
  - --trust-remote-code
  - --tensor-parallel-size 4
  - --disable-custom-all-reduce
  - --kv-cache-dtype fp8
  - --block-size 256
  - --max-model-len 32768
  - --gpu-memory-utilization 0.95
  - --max-num-batched-tokens 1024
  - --max-num-seqs 1
  - --tokenizer-mode deepseek_v4
  - --no-scheduler-reserve-full-isl
  - --speculative-config {"method":"deepseek_mtp","num_speculative_tokens":2}
  - --compilation-config {"cudagraph_mode":"FULL_AND_PIECEWISE","custom_ops":["all"]}

suite_params:
  batch_decode:
    concurrency: [1, 4]
  needle:
    sizes_words: [8000, 12000]
