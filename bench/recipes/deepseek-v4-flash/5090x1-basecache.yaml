id: deepseek-v4-flash/5090x1-basecache
model: DeepSeek-V4-Flash
served_name: deepseek-v4-flash
summary: "1x RTX 5090 (32 GB) - host-resident 2-bit base + gated FP4 need-pool"

requires:
  gpus: 1
  vram_gb: 32
  host_ram_gb: 96

context: 32768
load_timeout_s: 3600

# Quality-validated 2026-07-13 (GSM8K-200 95.0%, needle 32k PASS, ~17 tok/s):
# base 14 GiB is the STARVATION FLOOR for MTP-2 x 2 seqs (11 GiB corrupted
# math - the boot guard now refuses it); gate tau 0.60 (code default) with a
# small NON-SPLIT FP4 need-pool (bit-faithful nibbles; split's mag-0 merge
# is lossy - see internal/SPLIT_FP4_ZERO_LOSS_NEXT_SESSION.md).
env:
  VLLM_MOE_W2: "1"
  VLLM_MOE_W2_BASE_CACHE_GB: "14"
  VLLM_MOE_W2_DELTA_GB: "1"
  VLLM_MOE_W2_GATE: "1"
  # pool below the FIRE FLOOR (one step's routed union ~10 GiB
  # non-split at TP1): fires cannot cover their own step, so the
  # only sound mode is INCREMENTAL promotion - uncapped measured
  # 94.5% / +110%% tokens vs 96.5%/95.0%% with cap 64. Remove the
  # cap only on configs with pool >= the step routed union.
  VLLM_MOE_W2_GATE_MAX_PROMOTE: "64"

serve_args:
  - --trust-remote-code
  - --kv-cache-dtype fp8
  - --block-size 256
  - --max-model-len 32768
  - --gpu-memory-utilization 0.95
  - --max-num-batched-tokens 1024
  - --max-num-seqs 2
  - --tokenizer-mode deepseek_v4
  - --no-scheduler-reserve-full-isl
  - --speculative-config {"method":"deepseek_mtp","num_speculative_tokens":2}
  - --compilation-config {"cudagraph_mode":"FULL_AND_PIECEWISE","custom_ops":["all"]}

warmup:
  decode_requests: 8

suite_params:
  decode:
    runs: 7
  batch_decode:
    concurrency: [1, 2]
  needle:
    sizes_words: [6000]

tuning:
  objective: decode.median_tok_s
  constraints: ["arithmetic.score>=2"]
  axes:
    - kind: env
      name: VLLM_MOE_W2_BASE_CACHE_GB
      # 11 removed: below the per-step working-set floor (MTP-2 x 2 seqs)
      # - silent quality corruption, now refused by the boot guard.
      values: ["14", "16"]
