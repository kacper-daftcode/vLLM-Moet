id: deepseek-v4-flash/5090x1-basecache
model: DeepSeek-V4-Flash
served_name: deepseek-v4-flash
summary: "1x RTX 5090 (32 GB) - host-resident 2-bit base + gated FP4 need-pool"

requires:
  gpus: 1
  vram_gb: 32
  host_ram_gb: 96

context: 32768
load_timeout_s: 3600

# Quality-validated 2026-07-23, WINDOW-MATCHED protocol (greedy GPQA is
# serving-window sensitive for the MODEL itself - native @32k scores 69.04
# vs 74.24 @131k; compare only same-window):
#   GSM8K-200 95.0% (native 97.0; the -2pp is the 32 GB base-coverage
#   ceiling, stable across 4 runs on 2 card counts), GPQA-diamond NT
#   68.88% vs native@32k 68.88% - EXACT parity, McNemar-clean.
# SPEC = MTP-1 (2026-07-24): the spec-drift investigation closed - the
# quality cost of speculation scales with ACCEPTED drafts (verify-batch
# KV micro-noise amplified by 2-bit; paired on 1x6000-cache: MTP-1
# p=0.52 = no significant loss, MTP-2 p=0.031 = real -3..-5). MTP-1
# keeps most of the speedup at quality parity. 5090-cell validation
# runs queued; numbers below are the no-spec measurements.
# GEOMETRY (2026-07-22): the merged trunk grew ~2 GiB on base-cache
# boots (bisect pending, agenda lesson 12) - the historical base 14 /
# seqs 2 / batched 1024 now OOMs at load on 31.4 GiB. Validated boot:
# base 12 + seqs 1 + batched 512 (single-user semantics anyway).
# Gate tau 0.60 cap64 + S4 stays: on 36-40% coverage the FP4 need-pool
# does real work (GSM8K +1.5pp vs gate-off, measured 2026-07-22).
env:
  VLLM_MOE_W2: "1"
  VLLM_MOE_W2_BASE_CACHE_GB: "12"
  VLLM_MOE_W2_DELTA_GB: "1"
  VLLM_MOE_W2_GATE: "1"
  # pool below the FIRE FLOOR (one step's routed union ~10 GiB
  # non-split at TP1): fires cannot cover their own step, so the
  # only sound mode is INCREMENTAL promotion - uncapped measured
  # 94.5% / +110%% tokens vs 96.5%/95.0%% with cap 64. Remove the
  # cap only on configs with pool >= the step routed union.
  VLLM_MOE_W2_GATE_MAX_PROMOTE: "64"
  # DEGRADED gate mode, explicit consent: the pool is below the
  # FIRE FLOOR (one step's routed union), so the boot guard would
  # refuse to serve. Fires upgrade incrementally (cap 64); tau->1
  # does NOT converge to native on this card. Measured quality at
  # this operating point: GSM8K-200 96.5% (1xPRO6000) / 95.0%
  # (1x5090), both p=1 vs native. The split capacity fix (2x
  # slots/GiB) is the path out of degraded mode on these cards.
  VLLM_MOE_W2_FORCE_POOL: "1"
  # S4 verify-row masking: a NO-OP while MTP is off (kept for the day
  # the MTP x base-cache bug is fixed and spec comes back). NOTE:
  # prefill-FP4 ensure is NOT set here - the 1 GiB need-pool (~85
  # non-split slots) is below one prefill layer's working set, ensure
  # would thrash it (warns "pool too tight").
  VLLM_MOE_W2_GATE_SPEC_MASK: "1"

serve_args:
  - --trust-remote-code
  - --kv-cache-dtype fp8
  - --block-size 256
  - --max-model-len 32768
  - --gpu-memory-utilization 0.95
  - --max-num-batched-tokens 512
  - --max-num-seqs 1
  - --tokenizer-mode deepseek_v4
  - --no-scheduler-reserve-full-isl
  - --speculative-config {"method":"deepseek_mtp","num_speculative_tokens":1}
  - --compilation-config {"cudagraph_mode":"FULL_AND_PIECEWISE","custom_ops":["all"]}

warmup:
  decode_requests: 8

suite_params:
  decode:
    runs: 7
  batch_decode:
    concurrency: [1]
  needle:
    sizes_words: [6000]

tuning:
  objective: decode.median_tok_s
  constraints: ["arithmetic.score>=2"]
  axes:
    - kind: env
      name: VLLM_MOE_W2_BASE_CACHE_GB
      # 12 = the validated post-regression boot (agenda lesson 12);
      # retest 13-14 after the VRAM bisect lands.
      values: ["12", "13"]
