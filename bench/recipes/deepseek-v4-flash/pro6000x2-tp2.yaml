id: deepseek-v4-flash/pro6000x2-tp2
model: DeepSeek-V4-Flash
served_name: deepseek-v4-flash
summary: "2x RTX PRO 6000 TP2 - throughput"

requires:
  gpus: 2
  vram_gb: 96

context: 24576
load_timeout_s: 2400

env:
  VLLM_MOE_W2: "1"
  VLLM_MOE_W2_DELTA_GB: "auto"

serve_args:
  - --trust-remote-code
  - --tensor-parallel-size 2
  - --disable-custom-all-reduce
  - --kv-cache-dtype fp8
  - --block-size 256
  - --max-model-len 24576
  - --gpu-memory-utilization 0.95
  - --max-num-batched-tokens 1024
  - --max-num-seqs 4
  - --tokenizer-mode deepseek_v4
  - --no-scheduler-reserve-full-isl
  - --speculative-config {"method":"deepseek_mtp","num_speculative_tokens":2}
  - --compilation-config {"cudagraph_mode":"FULL_AND_PIECEWISE","custom_ops":["all"]}

suite_params:
  batch_decode:
    concurrency: [1, 4]
  needle:
    sizes_words: [8000, 20000]

notes: |
  The published TP2 prefill figure (5 791 tok/s) predates AFRAG; re-measure.
