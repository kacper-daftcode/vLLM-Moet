id: rtx-pro6000x4
gpus:
  name: "RTX PRO 6000 Blackwell Workstation"
  count: 4
  vram_gb: 96
host_ram_gb: 1007

runtime: docker
docker_image: vllm-moet-recipes:v024
shm_size: 64g

env:
  PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True

models:
  GLM-5.2-NVFP4: /workspace/glm-5.2-nvfp4
  DeepSeek-V4-Flash: /workspace/ds4flash-official

planes_cache:
  GLM-5.2-NVFP4: /workspace/.planes-cache-glm-bench

log_dir: /root/logs/bench

# external eval tool for the quality suite (git SHA recorded in results)
quality_tool: /root/workspace/llm-inference-bench/llm_decode_bench.py
