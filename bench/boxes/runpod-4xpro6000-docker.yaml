# The same physical box as runpod-4xpro6000.yaml, driven through the RECIPES
# image instead of the venv — benching exactly the artifact customers run.
# The runner mounts local weights over /models (the launcher's download
# no-ops) and the checkout's recipes over the baked-in copies, so recipe
# edits apply without an image rebuild.

id: runpod-4xpro6000-docker
gpus:
  name: "RTX PRO 6000 Blackwell"
  count: 4
  vram_gb: 96
host_ram_gb: 1511

runtime: docker
docker_image: vllm-moet-recipes:v024
shm_size: 64g

# Host quirks only — passed as -e. Toolchain env (CUDA_HOME, FLASHINFER_*,
# VLLM_MOE_W2_CUBIT_DIR, PATH prepends) stays out: the image ships its own.
env:
  NCCL_P2P_DISABLE: "1"             # this host: P2P silently corrupt
  PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True

models:
  GLM-5.2-NVFP4: /root/models/GLM-5.2-NVFP4
  Kimi-K2.7-Code-NVFP4: /root/models/Kimi-K2.7-Code-NVFP4
  Kimi-K2.7-Code-eagle3: /root/models/Kimi-K2.7-Code-eagle3

planes_cache:
  Kimi-K2.7-Code-NVFP4: /root/models/.planes-cache-kimi
  GLM-5.2-NVFP4: /root/models/.planes-cache-glm

log_dir: /root/logs/bench
